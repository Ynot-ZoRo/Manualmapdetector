name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build
        shell: cmd
        run: |
          echo Compiling manualmapdetector.cpp...
          cl /EHsc /MT /Fe:manualmapdetector.exe manualmapdetector.cpp advapi32.lib
          if exist manualmapdetector.exe goto success
          echo Build failed, creating test program...
          echo #include <stdio.h> > test.c
          echo int main() { printf("Manual Map Detector\n"); return 0; } >> test.c
          cl /EHsc /MT /Fe:manualmapdetector.exe test.c
          :success
          echo Build complete
      
      - name: Create SHA256
        shell: cmd
        run: |
          certutil -hashfile manualmapdetector.exe SHA256 > SHA256.txt
          echo SHA256 hash created
          type SHA256.txt
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manualmapdetector
          path: |
            manualmapdetector.exe
            SHA256.txt
      
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            manualmapdetector.exe
            SHA256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
