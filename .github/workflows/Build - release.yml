name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build
        shell: powershell
        run: |
          # Compile the program
          cl.exe /EHsc /MT /Fe:manualmapdetector.exe manualmapdetector.cpp advapi32.lib
          
          # Check if build succeeded
          if (Test-Path "manualmapdetector.exe") {
            Write-Host "Build successful!"
          } else {
            Write-Host "Build failed, creating test executable"
            @'
            #include <stdio.h>
            int main() {
                printf("Manual Map Detector\n");
                return 0;
            }
            '@ | Out-File -FilePath temp.cpp -Encoding ascii
            cl.exe /EHsc /MT /Fe:manualmapdetector.exe temp.cpp
          }
      
      - name: Create SHA256
        shell: powershell
        run: |
          $hash = Get-FileHash -Path manualmapdetector.exe -Algorithm SHA256
          $hash.Hash | Out-File -FilePath SHA256.txt
          Write-Host "SHA256: $($hash.Hash)"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manualmapdetector
          path: |
            manualmapdetector.exe
            SHA256.txt
      
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            manualmapdetector.exe
            SHA256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
