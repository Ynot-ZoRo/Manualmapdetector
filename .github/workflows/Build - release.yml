name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile executable
      run: |
        dir *.cpp *.c 2>nul
        cl /EHsc /MT /Fe:Manualmapdetector.exe *.cpp *.c 2>nul
      shell: cmd
    
    - name: Check if compiled
      run: |
        if exist Manualmapdetector.exe (
          echo Build successful!
          dir Manualmapdetector.exe
        ) else (
          echo No .exe found - checking for existing exe
          dir *.exe
        )
      shell: cmd
    
    - name: Find any exe file
      id: find_exe
      run: |
        for %%i in (*.exe) do (
          echo "EXE_NAME=%%i" >> %GITHUB_ENV%
          echo "Found: %%i"
          goto :done
        )
        echo "ERROR: No executable found!"
        exit /b 1
        :done
      shell: cmd
    
    - name: Create SHA256
      run: |
        certutil -hashfile "%EXE_NAME%" SHA256 > SHA256.txt
        echo "SHA256 hash created"
      shell: cmd
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: Release ${{ github.ref_name }}
        files: |
          ${{ env.EXE_NAME }}
          SHA256.txt
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Self-contained Windows executable
          - Built with MSVC /MT (static linking)
          - SHA256 checksum included
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}          - SHA256 checksum included
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
