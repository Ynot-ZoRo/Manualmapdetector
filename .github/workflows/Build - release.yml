name: Build and Release ZIP

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup MinGW (g++)
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Compile EXE
      run: |
        g++ manualmapdetector.cpp -o manualmapdetector.exe

    - name: Create release folder
      run: |
        mkdir release
        copy manualmapdetector.exe release\

    - name: Zip release folder
      run: |
        powershell Compress-Archive -Path release\* -DestinationPath manualmapdetector.zip

    - name: Upload ZIP to Release
      uses: softprops/action-gh-release@v2
      with:
        files: manualmapdetector.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
