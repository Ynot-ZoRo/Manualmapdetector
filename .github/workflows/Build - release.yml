name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0.0
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile Executable
      run: |
        cl.exe /EHsc /O2 /MT manualmapdetector.cpp /Fe:manualmapdetector.exe
      # /MT links the C Runtime statically so it's a self-contained .exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: manualmapdetector-exe
        path: manualmapdetector.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: manualmapdetector.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
