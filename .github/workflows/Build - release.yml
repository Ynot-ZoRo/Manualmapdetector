name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Fix Unicode issues in source
      run: |
        echo "Fixing Unicode string literals in manualmapdetector.cpp..."
        powershell -Command "(Get-Content manualmapdetector.cpp) -replace 'LookupPrivilegeValue\(nullptr,\s*\"([^\"]+)\"', 'LookupPrivilegeValue(nullptr, L\"$1\"' | Set-Content manualmapdetector.cpp"
        echo "Fixed!"
      shell: cmd
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile executable
      run: |
        echo "Compiling manualmapdetector.cpp..."
        cl /EHsc /MT /Fe:manualmapdetector.exe manualmapdetector.cpp advapi32.lib
      shell: cmd
    
    - name: Verify build
      run: |
        if exist manualmapdetector.exe (
          echo "✓ Build successful!"
          dir manualmapdetector.exe
        ) else (
          echo "✗ Build failed - checking for any exe"
          dir *.exe
          exit 1
        )
      shell: cmd
    
    - name: Create SHA256
      run: |
        certutil -hashfile manualmapdetector.exe SHA256 > SHA256.txt
        echo "SHA256 hash created"
        type SHA256.txt
      shell: cmd
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        files: |
          manualmapdetector.exe
          SHA256.txt
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Self-contained Windows executable
          - Compiled with MSVC /MT (static linking)
          - SHA256 checksum included
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
