name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build EXE
        run: cl /EHsc /MT manualmapdetector.cpp /Fe:manualmapdetector.exe
        continue-on-error: true
      
      - name: Create Checksum
        run: |
          powershell -command "& { (Get-FileHash manualmapdetector.exe -Algorithm SHA256).Hash | Out-File sha256.txt }"
      
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "manualmapdetector.exe, sha256.txt"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
