name: Release Existing Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Find exe files
      id: find_exe
      run: |
        exe_file=$(find . -name "*.exe" -type f | head -1)
        if [ -n "$exe_file" ]; then
          echo "EXE_PATH=$exe_file" >> $GITHUB_ENV
          echo "EXE_NAME=$(basename "$exe_file")" >> $GITHUB_ENV
          echo "Found: $exe_file"
        else
          echo "No exe files found in repository!"
          exit 1
        fi
    
    - name: Create SHA256
      run: |
        sha256sum "${{ env.EXE_PATH }}" > SHA256.txt
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        files: |
          ${{ env.EXE_PATH }}
          SHA256.txt
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Files included:
          - Executable: `${{ env.EXE_NAME }}`
          - SHA256 checksum
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
