name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install MinGW
        run: |
          choco install mingw -y
          echo "C:\mingw64\bin" >> $env:GITHUB_PATH
      
      - name: Compile
        run: g++ -static -o manualmapdetector.exe manualmapdetector.cpp
      
      - name: Create SHA256
        run: |
          certutil -hashfile manualmapdetector.exe SHA256 > sha256.txt
      
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            manualmapdetector.exe
            sha256.txt
