name: Build Static EXE

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Compile static EXE
      run: |
        g++ manualmapdetector.cpp -o manualmapdetector.exe ^
        -static -static-libgcc -static-libstdc++ -s

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: manualmapdetector
        path: manualmapdetector.exe

    - name: Create Release & Upload EXE
      uses: softprops/action-gh-release@v2
      with:
        files: manualmapdetector.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
