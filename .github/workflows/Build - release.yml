name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile executable with correct settings
      run: |
        echo "Compiling manualmapdetector.cpp..."
        cl /EHsc /MT /D_UNICODE /DUNICODE /Fe:manualmapdetector.exe manualmapdetector.cpp
      shell: cmd
    
    - name: Try alternative compilation if failed
      if: failure()
      run: |
        echo "Trying with different settings..."
        cl /EHsc /MT /D_UNICODE /Fe:manualmapdetector.exe manualmapdetector.cpp /link user32.lib advapi32.lib
      shell: cmd
    
    - name: Try without Unicode
      if: failure()
      run: |
        echo "Trying without Unicode..."
        cl /EHsc /MT /Fe:manualmapdetector.exe manualmapdetector.cpp
      shell: cmd
    
    - name: Check if compiled successfully
      run: |
        if exist manualmapdetector.exe (
          echo "✓ Build successful!"
          dir manualmapdetector.exe
        ) else (
          echo "✗ Build failed"
          exit 1
        )
      shell: cmd
    
    - name: Create SHA256
      run: |
        certutil -hashfile manualmapdetector.exe SHA256 > SHA256.txt
        echo "SHA256 hash created"
        type SHA256.txt
      shell: cmd
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        files: |
          manualmpdetector.exe
          SHA256.txt
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Self-contained Windows executable
          - Compiled with MSVC /MT (static linking)
          - SHA256 checksum included
          
          ### Usage:
          Run `manualmapdetector.exe` from command line
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
