name: Build and Release ZIP

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: mingw-w64-x86_64-gcc

    - name: Compile EXE
      shell: msys2 {0}
      run: |
        g++ manualmapdetector.cpp -o manualmapdetector.exe \
        -lwintrust -liphlpapi -lws2_32 \
        -Wl,-subsystem,console

    - name: Create release folder
      run: |
        mkdir release
        copy manualmapdetector.exe release\

    - name: Zip release folder
      run: |
        powershell Compress-Archive -Path release\* -DestinationPath manualmapdetector.zip

    - name: Upload ZIP to Release
      uses: softprops/action-gh-release@v2
      with:
        files: manualmapdetector.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
