name: Docker Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with Docker
        run: |
          docker run --rm -v "$(pwd)":/src -w /src gcc:latest sh -c "
            apt-get update && apt-get install -y mingw-w64 &&
            x86_64-w64-mingw32-g++ -static -o manualmapdetector.exe manualmapdetector.cpp
          "
      
      - uses: softprops/action-gh-release@v2
        with:
          files: manualmapdetector.exe
