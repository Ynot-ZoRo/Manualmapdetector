name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Fix Unicode issues in source
      run: |
        echo "Fixing Unicode string literals..."
        powershell -Command "(Get-Content manualmpdetector.cpp) -replace 'LookupPrivilegeValue\(nullptr,\s*\"([^\"]+)\"', 'LookupPrivilegeValue(nullptr, L\"$1\"' | Set-Content manualmpdetector.cpp"
        echo "Fixed!"
      shell: cmd
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Compile executable
      run: |
        echo "Compiling..."
        cl /EHsc /MT /D_UNICODE /DUNICODE /Fe:manualmpdetector.exe manualmpdetector.cpp advapi32.lib
      shell: cmd
    
    - name: Verify build
      run: |
        if exist manualmpdetector.exe (
          echo "✓ Build successful!"
          dir manualmpdetector.exe
        ) else (
          echo "✗ Build failed"
          exit 1
        )
      shell: cmd
    
    - name: Create SHA256
      run: |
        certutil -hashfile manualmpdetector.exe SHA256 > SHA256.txt
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        files: |
          manualmpdetector.exe
          SHA256.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
