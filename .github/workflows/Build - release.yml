name: Simple Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile
      run: |
        cl manualmapdetector.cpp /Fe:manualmapdetector.exe
      shell: cmd
    
    - name: Create checksum
      run: certutil -hashfile manualmapdetector.exe SHA256 > sha256.txt
      shell: cmd
    
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: manualmapdetector.exe, sha256.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}          
          **Download:** `manualmapdetector.exe`
          
          **SHA256 Checksum:** Included in `SHA256.txt`
          
          ### Features:
          - Static linking (no DLL dependencies)
          - Runs on Windows 10/11
          
          ### Usage:
          ```cmd
          manualmapdetector.exe
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
