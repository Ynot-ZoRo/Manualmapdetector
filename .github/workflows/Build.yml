name: Build ManualMapDetector

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create src directory if it doesn't exist
      run: |
        if not exist src mkdir src
        if exist manualmapdetector.cpp copy manualmapdetector.cpp src\manualmapdetector.cpp
        if exist manualmapdetector.cpp del manualmapdetector.cpp
      shell: cmd
    
    - name: List files for debugging
      run: dir /s
      shell: cmd
    
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64
    
    - name: Build project
      run: cmake --build build --config Release
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ManualMapDetector
        path: build/bin/Release/ManualMapDetector.exe
